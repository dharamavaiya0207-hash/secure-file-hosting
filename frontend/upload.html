<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File - Secure File Hosting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="brand">🔐 SecureFile</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="downloads.html">Downloads</a>
            <a href="my-files.html">My Files</a>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="page">
        <div class="container">
            <h2>Upload File</h2>
            <p class="subtitle">Only PDF and MP4 files are allowed (max 20 MB)</p>

            <input type="file" id="file">

            <button class="primary-btn" onclick="uploadFile()">Upload File</button>

            <p class="message" id="message"></p>

            <div class="center-actions">
                <a href="downloads.html">Go to Downloads</a>
                <a href="my-files.html">Go to My Files</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
