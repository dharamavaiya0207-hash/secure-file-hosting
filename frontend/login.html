<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure File Hosting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="brand">🔐 SecureFile</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
        </div>
    </div>

    <div class="page">
        <div class="container">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to access uploads, downloads and your files</p>

            <input type="email" id="email" placeholder="Enter email">
            <input type="password" id="password" placeholder="Enter password">

            <button class="primary-btn" onclick="login()">Login</button>

            <p class="message" id="message"></p>

            <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
