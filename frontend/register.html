<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Secure File Hosting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="brand">🔐 SecureFile</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </div>
    </div>

    <div class="page">
        <div class="container">
            <h2>Create Account</h2>
            <p class="subtitle">Register to upload and manage your files securely</p>

            <input type="text" id="username" placeholder="Enter username">
            <input type="email" id="email" placeholder="Enter email">
            <input type="password" id="password" placeholder="Enter password">

            <button class="primary-btn" onclick="register()">Register</button>

            <p class="message" id="message"></p>

            <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
